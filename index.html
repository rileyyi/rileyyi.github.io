<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;cursor:none !important}
:root{--off-white:#f0ede8;--black:#111110;--mid:#888780;--accent:#FD5A1E;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Karla',sans-serif}
html{scroll-behavior:smooth}
body{background:var(--off-white);color:var(--black);font-family:var(--sans);overflow-x:hidden}
.cursor{position:fixed;width:8px;height:8px;background:var(--off-white);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .3s,height .3s;mix-blend-mode:difference}
.cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(240,237,232,.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .4s cubic-bezier(.23,1,.32,1),width .3s,height .3s;mix-blend-mode:difference}
body.hovering .cursor{width:16px;height:16px}
body.hovering .cursor-ring{width:56px;height:56px}
body.grabbing .cursor{width:20px;height:20px;background:var(--accent)}
body.grabbing .cursor-ring{width:64px;height:64px;border-color:rgba(253,90,30,.4)}
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 60px;height:48px;display:flex;align-items:center;transition:background .6s ease;opacity:0;animation:fadeIn .8s ease .3s forwards;background:var(--off-white);font-size:11px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;font-family:var(--sans)}
nav.on-about{background:var(--black)}
nav.on-services{background:#1a1917}
@keyframes fadeIn{to{opacity:1}}
.nav-logo{color:var(--black);text-decoration:none;transition:color .6s ease}
.nav-logo .matrix-char{display:inline-block;width:1.1ch;text-align:center}
.nav-logo .matrix-char.space{width:.6ch}

.nav-ver{color:rgba(180,160,120,.35);margin-left:24px}

.nav-spacer{flex:1}
.nav-link{color:var(--black);text-decoration:none;position:relative;transition:color .6s ease;margin-left:36px}
.nav-link:hover{color:var(--accent)}
.nav-link::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:.5px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.23,1,.32,1)}
.nav-link:hover::after{transform:scaleX(1)}

nav.on-about .nav-links a:hover,nav.on-services .nav-link:hover{color:var(--accent)}
#shapeCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;pointer-events:none;will-change:transform}
#shapeCanvas.dragging{pointer-events:auto}
.section-counter{z-index:90}
.progress-bar{z-index:250}
#phiTrigger,#phiOverlay{z-index:160}
section{position:relative;z-index:2}
.divider-line{position:relative;z-index:2}
#hero{background:transparent;min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 60px 60px;overflow:visible}
.hero-bg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;opacity:.055}

.hero-coords a{font-size:11px;font-weight:300;letter-spacing:.04em;color:var(--mid);line-height:1.8;text-decoration:none;transition:color .3s}

.scroll-hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;transition:opacity .6s ease}
.scroll-hint.visible{opacity:0.4;transition:opacity .5s ease}

.scroll-hint span{font-size:10px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--black)}

@keyframes scrollLine{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
.divider-line{height:1px;position:relative;overflow:hidden;background:linear-gradient(90deg,transparent,rgba(17,17,16,.12) 15%,rgba(17,17,16,.12) 85%,transparent)}
.divider-line::after{content:'';position:absolute;top:0;left:-60%;width:60%;height:100%;background:linear-gradient(90deg,transparent,var(--black),transparent);animation:shimmer 3s ease-in-out infinite}
@keyframes shimmer{0%{left:-60%}100%{left:100%}}
.progress-bar{position:fixed;top:0;left:0;height:2px;background:var(--accent);z-index:200;width:0%}
.section-counter{position:fixed;right:30px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:12px}
.section-dot{width:6px;height:6px;border-radius:50%;border:.5px solid var(--mid);background:transparent;transition:background .3s,transform .3s,border-color .3s;opacity:0}
.section-dot.awake{animation:dotWake .8s ease forwards}
.section-dot.active{background:var(--accent);border-color:var(--accent);transform:scale(1.5)}
@keyframes dotWake{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
.section-label-accent{font-size:10px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:40px}
section{display:flex;align-items:center}
#about{padding:100px 60px 80px;background:var(--black);color:var(--off-white);flex-direction:column;align-items:flex-start;overflow:hidden}
.about-bg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;opacity:.065}
#about .big-text{font-family:var(--serif);font-size:clamp(2.4rem,5vw,4.4rem);font-weight:300;line-height:1.15;color:var(--off-white);max-width:820px;margin-bottom:60px}
#about .big-text em{font-style:italic;color:var(--accent)}
.about-grid{display:grid;grid-template-columns:1fr 1fr 1fr;width:100%;border-top:.5px solid rgba(240,237,232,.15)}

.about-item:not(:first-child){padding-left:40px}
.about-item:last-child{border-right:none}
